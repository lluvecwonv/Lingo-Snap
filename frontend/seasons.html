<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingo Snap - Season 선택</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <meta property="og:title" content="Lingo Snap">
  <meta property="og:description" content="Season별 표현 학습">
  <meta property="og:image" content="/static/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="season-page-body">
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <a href="/contents" class="back-link" aria-label="콘텐츠 목록으로 돌아가기">Back</a>
        <h1 class="logo" id="season-content-title">Season 선택</h1>
      </div>
    </div>
  </header>

  <main class="season-page">
    <section class="season-hero">
      <p class="season-kicker">STEP 1</p>
      <h2 id="season-hero-title">먼저 시즌을 골라줘</h2>
      <p class="season-subtitle">선택한 시즌으로 들어가면 단어, 구문, 표현이 그 시즌 기준으로 저장돼.</p>
    </section>

    <section class="season-actions">
      <form id="custom-season-form" class="season-create-form">
        <label for="custom-season-input">새 시즌 바로 열기</label>
        <div class="season-create-row">
          <input id="custom-season-input" type="number" min="1" max="99" placeholder="Season number" required>
          <button type="submit" class="btn btn-primary">열기</button>
        </div>
      </form>
    </section>

    <section class="season-section">
      <div class="season-section-head">
        <h3>기존 시즌</h3>
        <p id="season-summary" class="season-summary"></p>
      </div>
      <div id="season-grid" class="season-grid"></div>
      <p id="season-empty" class="no-results hidden">아직 저장된 시즌이 없어. 위에서 시즌 번호를 입력해서 바로 시작하면 돼.</p>
    </section>
  </main>

  <script src="/static/api.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const contentId = params.get('content_id');
    const seasonalPlatforms = ['netflix', 'youtube'];

    async function init() {
      if (!contentId) {
        window.location.href = '/contents';
        return;
      }

      try {
        const user = await API.get('/me');
        if (!user) return;

        const contents = await API.get('/contents');
        const content = (contents || []).find(item => String(item.id) === String(contentId));
        if (!content) {
          window.location.href = '/contents';
          return;
        }

        if (!seasonalPlatforms.includes(content.platform)) {
          window.location.href = `/expressions?content_id=${contentId}`;
          return;
        }

        document.getElementById('season-content-title').textContent = content.title;
        document.getElementById('season-hero-title').textContent = `${content.title}의 시즌을 골라줘`;
        document.title = `${content.title} - Season 선택`;

        const seasons = await API.get(`/contents/${contentId}/seasons`);
        renderSeasons(seasons || []);
      } catch {
        window.location.href = '/login';
      }
    }

    function renderSeasons(seasons) {
      const grid = document.getElementById('season-grid');
      const empty = document.getElementById('season-empty');
      const summary = document.getElementById('season-summary');

      if (!seasons.length) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        summary.textContent = '기존에 저장된 시즌 없음';
        return;
      }

      empty.classList.add('hidden');
      const totalExpressions = seasons.reduce((sum, season) => sum + season.expression_count, 0);
      summary.textContent = `총 ${seasons.length}개 시즌 · ${totalExpressions}개 표현`;

      grid.innerHTML = seasons.map(season => `
        <button class="season-card" onclick="openSeason(${season.season})">
          <span class="season-card-kicker">Season</span>
          <strong class="season-card-number">${season.season}</strong>
          <span class="season-card-meta">Episode ${season.episode_count}</span>
          <span class="season-card-meta">${season.expression_count} expressions</span>
        </button>
      `).join('');
    }

    function openSeason(season) {
      window.location.href = `/expressions?content_id=${contentId}&season=${season}`;
    }

    document.getElementById('custom-season-form').addEventListener('submit', (event) => {
      event.preventDefault();
      const season = parseInt(document.getElementById('custom-season-input').value, 10);
      if (!season || season < 1) return;
      openSeason(season);
    });

    init();
  </script>
</body>
</html>
