<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingo Snap - 콘텐츠</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <meta property="og:title" content="Lingo Snap">
  <meta property="og:description" content="넷플릭스 & 유튜브 영어 표현 학습">
  <meta property="og:image" content="/static/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=20260323">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <a href="/language" class="back-link" title="언어 선택" aria-label="언어 선택으로 돌아가기">Back</a>
        <h1 class="logo">Lingo Snap <span class="logo-sub" id="lang-label">English</span></h1>
      </div>
      <div class="header-actions">
        <span id="user-display" class="user-display"></span>
        <button id="add-content-btn" class="btn btn-primary">+ 새 콘텐츠</button>
        <button id="settings-btn" class="btn btn-icon" title="알림 설정">🔔</button>
        <button id="logout-btn" class="btn btn-outline">로그아웃</button>
      </div>
    </div>
  </header>

  <!-- Category Tabs + View Toggle -->
  <div class="contents-toolbar">
    <nav class="category-tabs" id="category-tabs" style="margin:0;padding:0;flex:1"></nav>
    <div class="view-toggle">
      <button class="view-toggle-btn active" data-view="grid" title="그리드 보기">Grid</button>
      <button class="view-toggle-btn" data-view="list" title="리스트 보기">List</button>
    </div>
  </div>

  <main class="contents-page">
    <div id="contents-grid" class="contents-grid"></div>
    <p id="no-contents" class="no-results hidden">아직 콘텐츠가 없습니다. 새 콘텐츠를 추가해보세요!</p>
  </main>

  <!-- Add Content Modal -->
  <div id="content-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>새 콘텐츠 추가</h2>
        <button class="modal-close" onclick="document.getElementById('content-modal').classList.add('hidden')">&times;</button>
      </div>
      <form id="content-form" class="modal-body">
        <label>언어</label>
        <div class="language-options">
          <label class="language-label">
            <input type="radio" name="content-language" value="english" checked>
            <span class="lang-badge">🇺🇸 EN</span>
          </label>
          <label class="language-label">
            <input type="radio" name="content-language" value="japanese">
            <span class="lang-badge">🇯🇵 日本語</span>
          </label>
          <label class="language-label">
            <input type="radio" name="content-language" value="chinese">
            <span class="lang-badge">🇨🇳 中文</span>
          </label>
          <label class="language-label">
            <input type="radio" name="content-language" value="spanish">
            <span class="lang-badge">🇪🇸 ES</span>
          </label>
          <label class="language-label">
            <input type="radio" name="content-language" value="french">
            <span class="lang-badge">🇫🇷 FR</span>
          </label>
        </div>

        <label>카테고리</label>
        <div class="platform-options">
          <label class="platform-label">
            <input type="radio" name="platform" value="netflix" checked>
            <span class="platform-badge netflix">Netflix</span>
          </label>
          <label class="platform-label">
            <input type="radio" name="platform" value="youtube">
            <span class="platform-badge youtube">YouTube</span>
          </label>
          <label class="platform-label">
            <input type="radio" name="platform" value="book">
            <span class="platform-badge book">원서</span>
          </label>
          <label class="platform-label">
            <input type="radio" name="platform" value="paper">
            <span class="platform-badge paper">논문</span>
          </label>
          <label class="platform-label">
            <input type="radio" name="platform" value="dictionary">
            <span class="platform-badge dictionary">단어사전</span>
          </label>
          <label class="platform-label">
            <input type="radio" name="platform" value="other">
            <span class="platform-badge other">기타</span>
          </label>
        </div>

        <label>제목 <span class="required">*</span></label>
        <input type="text" id="content-title" required placeholder="e.g. 에밀리 파리에 가다">
        <p id="title-hint" class="form-hint"></p>

        <label>링크 (선택)</label>
        <input type="text" id="content-url" placeholder="https://...">

        <label>표지 이미지 (선택)</label>
        <div class="thumbnail-upload-area">
          <input type="file" id="thumbnail-input" accept="image/*">
          <div id="thumbnail-preview" class="thumbnail-preview">
            <img id="thumbnail-preview-img" src="" alt="">
          </div>
          <button type="button" id="thumbnail-remove" class="thumbnail-remove-btn" style="display:none" onclick="removeThumbnail()">이미지 제거</button>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-outline" onclick="document.getElementById('content-modal').classList.add('hidden')">취소</button>
          <button type="submit" class="btn btn-primary">추가하기</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>알림 설정</h2>
        <button class="modal-close" onclick="document.getElementById('settings-modal').classList.add('hidden')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-row">
          <span>배너 알림</span>
          <label class="switch">
            <input type="checkbox" id="notif-enabled-check" checked>
            <span class="slider"></span>
          </label>
        </div>
        <div class="setting-row">
          <span>알림 소리</span>
          <label class="switch">
            <input type="checkbox" id="notif-sound-check" checked>
            <span class="slider"></span>
          </label>
        </div>
        <div class="setting-row">
          <span>알림 간격</span>
          <select id="notif-interval-select">
            <option value="10000">10초 (테스트)</option>
            <option value="60000">60초 (테스트)</option>
            <option value="300000" selected>5분</option>
            <option value="600000">10분</option>
            <option value="900000">15분</option>
            <option value="1800000">30분</option>
            <option value="3600000">1시간</option>
          </select>
        </div>
        <p class="form-hint" style="margin-top:8px">모든 콘텐츠에서 랜덤 표현이 팝업됩니다.</p>
      </div>
    </div>
  </div>

  <!-- Flashcard Popup -->
  <div id="flashcard-popup" class="flashcard-popup">
    <div class="flashcard-inner">
      <div class="flashcard-header">
        <span>복습 시간!</span>
        <button class="flashcard-close" onclick="Notifications.closeFlashcard()">&times;</button>
      </div>
      <p id="flash-expression" class="flash-expression"></p>
      <button id="flash-reveal-btn" class="btn btn-primary btn-sm" onclick="Notifications.revealAnswer()">뜻 보기</button>
      <div id="flash-answer" class="flash-answer hidden"></div>
      <p id="flash-source" class="flash-source"></p>
      <button id="flash-view-btn" class="btn btn-outline btn-sm hidden" style="margin-top:10px;width:100%">보기</button>
    </div>
  </div>

  <script src="/static/api.js?v=20260323"></script>
  <script src="/static/tts.js?v=20260323"></script>
  <script src="/static/notifications.js?v=20260323"></script>
  <script>
    let currentUser = null;
    let allContents = [];
    let activeTab = 'all';
    let activeLang = localStorage.getItem('selected_language') || 'english';
    let viewMode = localStorage.getItem('view_mode') || 'grid';
    let pendingThumbnail = '';

    const platformLabels = {
      netflix: 'Netflix', youtube: 'YouTube', book: '원서',
      paper: '논문', dictionary: '단어사전', other: '기타'
    };

    // Deterministic pastel color from content ID
    function pastelColor(id) {
      const h = (id * 137) % 360;
      return `hsl(${h}, 45%, 80%)`;
    }

    async function init() {
      try {
        currentUser = await API.get('/me');
        if (!currentUser) return;
        document.getElementById('user-display').textContent = currentUser.username;
        // Set lang label from localStorage
        const langLabel = document.getElementById('lang-label');
        const langNames = { english: 'English', japanese: '日本語', chinese: '中文', spanish: 'Español', french: 'Français' };
        if (langLabel) langLabel.textContent = langNames[activeLang] || 'English';
        // Sync modal language default
        const langRadio = document.querySelector(`input[name="content-language"][value="${activeLang}"]`);
        if (langRadio) langRadio.checked = true;
        initViewToggle();
        initThumbnailUpload();
        await loadContents();
      } catch {
        window.location.href = '/login';
      }
    }

    function initViewToggle() {
      const grid = document.getElementById('contents-grid');
      document.querySelectorAll('.view-toggle-btn').forEach(btn => {
        if (btn.dataset.view === viewMode) btn.classList.add('active');
        else btn.classList.remove('active');
        btn.addEventListener('click', () => {
          viewMode = btn.dataset.view;
          localStorage.setItem('view_mode', viewMode);
          document.querySelectorAll('.view-toggle-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          applyViewMode();
        });
      });
      applyViewMode();
    }

    function applyViewMode() {
      const grid = document.getElementById('contents-grid');
      grid.classList.toggle('list-view', viewMode === 'list');
    }

    function initThumbnailUpload() {
      const input = document.getElementById('thumbnail-input');
      input.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        resizeImage(file, 400, 250, 0.7, (dataUrl) => {
          pendingThumbnail = dataUrl;
          const preview = document.getElementById('thumbnail-preview');
          document.getElementById('thumbnail-preview-img').src = dataUrl;
          preview.classList.add('has-image');
          document.getElementById('thumbnail-remove').style.display = 'block';
        });
      });
    }

    function resizeImage(file, maxW, maxH, quality, callback) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          if (w > maxW) { h = h * maxW / w; w = maxW; }
          if (h > maxH) { w = w * maxH / h; h = maxH; }
          canvas.width = w;
          canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          callback(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function removeThumbnail() {
      pendingThumbnail = '';
      document.getElementById('thumbnail-input').value = '';
      document.getElementById('thumbnail-preview').classList.remove('has-image');
      document.getElementById('thumbnail-remove').style.display = 'none';
    }

    async function loadContents() {
      allContents = await API.get('/contents') || [];
      renderTabs();
      renderGrid();
    }

    function getFilteredByLang() {
      return allContents.filter(c => (c.language || 'english') === activeLang);
    }

    function renderTabs() {
      const tabsEl = document.getElementById('category-tabs');
      const langContents = getFilteredByLang();
      const counts = {};
      langContents.forEach(c => {
        counts[c.platform] = (counts[c.platform] || 0) + 1;
      });

      const platformOrder = ['netflix', 'youtube', 'book', 'paper', 'dictionary', 'other'];
      let html = `<button class="category-tab ${activeTab === 'all' ? 'active' : ''}" data-tab="all">전체<span class="tab-count">${langContents.length}</span></button>`;

      platformOrder.forEach(p => {
        if (counts[p]) {
          html += `<button class="category-tab ${activeTab === p ? 'active' : ''}" data-tab="${p}">${platformLabels[p]}<span class="tab-count">${counts[p]}</span></button>`;
        }
      });

      tabsEl.innerHTML = html;

      tabsEl.querySelectorAll('.category-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          activeTab = btn.dataset.tab;
          tabsEl.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderGrid();
        });
      });
    }

    function renderGrid() {
      const langContents = getFilteredByLang();
      const filtered = activeTab === 'all'
        ? langContents
        : langContents.filter(c => c.platform === activeTab);

      const grid = document.getElementById('contents-grid');
      const noMsg = document.getElementById('no-contents');

      if (filtered.length === 0) {
        grid.innerHTML = '';
        noMsg.classList.remove('hidden');
        const langNames = {
          english: 'English',
          japanese: '日本語',
          chinese: '中文',
          spanish: 'Español',
          french: 'Français',
        };
        const langName = langNames[activeLang] || 'English';
        noMsg.textContent = activeTab === 'all'
          ? `${langName} 콘텐츠가 없습니다. 새 콘텐츠를 추가해보세요!`
          : `${platformLabels[activeTab] || activeTab} 콘텐츠가 없습니다.`;
        return;
      }

      function getContentHref(content) {
        const seasonalPlatforms = ['netflix', 'youtube'];
        const base = seasonalPlatforms.includes(content.platform) ? '/seasons' : '/expressions';
        return `${base}?content_id=${content.id}`;
      }

      noMsg.classList.add('hidden');
      grid.innerHTML = filtered.map(c => {
        const thumbHtml = c.thumbnail_url
          ? `<img src="${c.thumbnail_url}" alt="${escapeHtml(c.title)}">`
          : `<div class="thumbnail-title">${escapeHtml(c.title)}</div>`;
        const bgStyle = c.thumbnail_url ? '' : `background:${pastelColor(c.id)}`;

        return `
        <div class="content-card" onclick="window.location.href='${getContentHref(c)}'">
          <div class="content-thumbnail" style="${bgStyle}">
            ${thumbHtml}
          </div>
          <div class="content-card-body">
            <div class="content-card-top">
              <span class="platform-badge ${c.platform}">${platformLabels[c.platform] || c.platform}</span>
              <button class="card-action-btn delete" onclick="event.stopPropagation(); deleteContent(${c.id}, '${c.title.replace(/'/g, "\\'")}')" title="삭제">&#x2715;</button>
            </div>
            <h3 class="content-title">${escapeHtml(c.title)}</h3>
            <p class="content-count">${c.expression_count}개 표현</p>
          </div>
        </div>
      `}).join('');
      applyViewMode();
    }

    async function deleteContent(id, title) {
      if (!confirm(`"${title}" 콘텐츠를 삭제하시겠습니까?\n포함된 모든 표현도 함께 삭제됩니다.`)) return;
      await API.del('/contents/' + id);
      await loadContents();
    }

    document.getElementById('add-content-btn').addEventListener('click', () => {
      // Sync modal language with current selection
      const langRadio = document.querySelector(`input[name="content-language"][value="${activeLang}"]`);
      if (langRadio) langRadio.checked = true;
      removeThumbnail();
      document.getElementById('content-modal').classList.remove('hidden');
    });

    document.getElementById('content-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('content-title').value.trim();
      const platform = document.querySelector('input[name="platform"]:checked').value;
      const language = document.querySelector('input[name="content-language"]:checked').value;
      const url = document.getElementById('content-url').value.trim();

      await API.post('/contents', { title, platform, language, url, thumbnail_url: pendingThumbnail });
      document.getElementById('content-modal').classList.add('hidden');
      document.getElementById('content-form').reset();
      removeThumbnail();
      await loadContents();
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await API.post('/logout', {});
      window.location.href = '/login';
    });

    // Settings & Notifications
    document.getElementById('settings-btn').addEventListener('click', () => {
      // Sync current notification state to modal UI before opening
      document.getElementById('notif-enabled-check').checked = Notifications.enabled;
      document.getElementById('notif-sound-check').checked = Notifications.soundEnabled;
      const savedInterval = localStorage.getItem('notif_interval');
      if (savedInterval) {
        const sel = document.getElementById('notif-interval-select');
        if (sel.querySelector(`option[value="${savedInterval}"]`)) sel.value = savedInterval;
      }
      document.getElementById('settings-modal').classList.remove('hidden');
    });
    document.getElementById('notif-enabled-check').addEventListener('change', (e) => {
      Notifications.toggle(e.target.checked);
    });
    document.getElementById('notif-interval-select').addEventListener('change', (e) => {
      Notifications.setInterval(parseInt(e.target.value));
    });
    document.getElementById('notif-sound-check').addEventListener('change', (e) => {
      Notifications.toggleSound(e.target.checked);
    });
    // Settings modal — no overlay-click close (prevents accidental dismissal)

    // Init notifications on contents page too
    Notifications.init();
    Notifications.requestPermission();

    // Sync settings UI with stored values
    const storedEnabled = localStorage.getItem('notif_enabled');
    if (storedEnabled === 'false') document.getElementById('notif-enabled-check').checked = false;
    const storedSound = localStorage.getItem('notif_sound');
    if (storedSound === 'false') document.getElementById('notif-sound-check').checked = false;
    const storedInterval = localStorage.getItem('notif_interval');
    if (storedInterval) {
      const sel = document.getElementById('notif-interval-select');
      if (sel.querySelector(`option[value="${storedInterval}"]`)) sel.value = storedInterval;
    }

    // Platform selection → update hint and placeholder
    const hints = {
      netflix: { ph: 'e.g. 에밀리 파리에 가다', hint: '' },
      youtube: { ph: 'e.g. English with Lucy', hint: '' },
      book: { ph: 'e.g. The Great Gatsby', hint: '원서 제목을 입력하세요' },
      paper: { ph: 'e.g. Causal Estimation of Memorisation Profiles', hint: '논문 제목을 입력하세요' },
      dictionary: { ph: 'e.g. 일상 단어장', hint: '단어장 이름을 자유롭게 지어주세요' },
      other: { ph: 'e.g. 팟캐스트, 강의 등', hint: '카테고리 : 제목 형태로 입력하세요' },
    };
    document.querySelectorAll('input[name="platform"]').forEach(radio => {
      radio.addEventListener('change', () => {
        const h = hints[radio.value] || hints.other;
        document.getElementById('content-title').placeholder = h.ph;
        document.getElementById('title-hint').textContent = h.hint;
      });
    });

    // Content modal — no overlay-click close (prevents accidental dismissal)

    function escapeHtml(str) {
      return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    init();
  </script>
</body>
</html>
